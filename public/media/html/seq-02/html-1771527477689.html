<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Denominación del programa</title>

  <link rel="stylesheet" href="../css_presentaciones/unitropico_base.css">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow-x: hidden;
      /* Fondo general de la página: imagen que cubre todo, fija y centrada */
      background: url("../img/background-1.jpg") no-repeat center center fixed;
      background-size: cover;
    }

    /* Contenedor principal */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    /* Imagen izquierda con recorte diagonal y animación */
    .hero-image {
      position: absolute;
      left: 0;
      top: 0;
      width: 52%;
      height: 100%;
      clip-path: polygon(0 0, 85% 0, 100% 50%, 85% 100%, 0 100%);
      overflow: hidden;
      pointer-events: none;
    }

    .hero-image::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("../img/lateral-2.webp") no-repeat center left;
      background-size: cover;
      will-change: transform;
      transform-origin: center;
      animation: pulse-hero 6s ease-in-out infinite;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transform: translateZ(0);
    }

    /* Panel derecho (texto) - sin fondo adicional, se ve el fondo del body */
    .hero-content {
      margin-left: 52%;
      width: 48%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 80px;
    }

    .hero-content h1 {
      font-size: 52px;
      font-weight: 800;
      color: #0f5e57;
      line-height: 1.15;
    }

    /* Badge superior derecho */
    .top-badge {
      position: absolute;
      top: 40px;
      right: 60px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .badge-year {
      background: #B5A160;
      color: white;
      padding: 12px 22px;
      font-weight: 800;
      font-size: 20px;
    }

    .badge-text {
      border-left: 3px solid #B5A160;
      padding-left: 14px;
      font-weight: 700;
      color: #0f5e57;
      font-size: 14px;
      line-height: 1.2;
    }

    /* Logo inferior derecho */
    .logo-bottom {
      position: absolute;
      bottom: 80px;
      right: 70px;
    }

    /* Texto vigilada */
    .vigilada {
      position: absolute;
      bottom: 80px;
      left: 70px;
      background: #B5A160;
      color: #0f5e57;
      padding: 6px 14px;
      font-size: 12px;
    }

    /* Barra verde inferior */
    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 22px;
      background: #0f5e57;
    }

    /* Responsive */
    @media(max-width:1024px) {
      .hero-image {
        display: none;
      }

      .hero-content {
        margin-left: 0;
        width: 100%;
        padding: 0 30px;
      }

      .hero-content h1 {
        font-size: 34px;
        text-align: center;
      }

      .top-badge {
        right: 20px;
        top: 20px;
      }

      .logo-bottom {
        right: 20px;
        bottom: 100px;
      }

      .vigilada {
        left: 20px;
        bottom: 100px;
      }
    }

    /* Animación pulso suave */
    @keyframes pulse-hero {
      0% { transform: scale(1); }
      50% { transform: scale(1.015); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <section class="hero">

    <!-- Imagen izquierda animada -->
    <div class="hero-image"></div>

    <!-- Título -->
    <div class="hero-content">
      <h1>Justificación<br>del programa</h1>
    </div>

    <!-- Badge superior derecho -->
    <div class="top-badge">
      <div class="badge-year">2026</div>
      <div class="badge-text">
        INGENIERÍA EN<br>
        INTELIGENCIA ARTIFICIAL
      </div>
    </div>

    <!-- Logo Unitrópico -->
    <div class="logo-bottom">
      <img src="../img/logo_unitropico.png" alt="Unitrópico" width="180">
    </div>

    <!-- Vigilada -->
    <div class="vigilada">– Vigilada MinEducación –</div>

    <!-- Barra inferior -->
    <div class="bottom-bar"></div>

  </section>

</body>
</html>
