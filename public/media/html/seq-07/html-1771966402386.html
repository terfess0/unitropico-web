<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asignación de Actividades - Unitrópico</title>
  <!-- Fuente Montserrat y CSS base -->
  <link rel="stylesheet" href="../css_presentaciones/unitropico_base.css">
  <style>
    /* =========================
       ESTILOS ADICIONALES
    ========================= */
    html,
    body {
      height: 100%;
      margin: 0;
      overflow-x: hidden;
      background: url("../img/background-1.jpg") no-repeat center center fixed;
      background-size: cover;
      font-family: 'Montserrat', sans-serif;
    }

    /* Navbar superior recortado */
    .navbar-img {
      width: 100%;
      background: var(--verde-1);
      text-align: center;
    }

    .navbar-img img {
      width: 100%;
      height: auto;
      max-height: 110px;
      object-fit: contain;
      display: block;
    }

    /* Contenedor del título central */
    .title-wrapper {
      display: flex;
      flex-direction: column;
      width: max-content;
      max-width: 90%;
      margin: 25vh auto 0 auto;
    }

    .text-light {
      font-size: 4rem;
      font-weight: 300;
      color: var(--verde-1, #004b40);
      text-align: left;
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .box-bottom {
      display: flex;
      width: 100%;
      margin-top: 5px;
    }

    /* Contenedor de la línea dorada */
    .left-box {
      flex-grow: 1;
      padding-top: 4px;
      /* Alineada con el borde inferior de la línea verde (6px-2px) */
      margin-right: -1px;
      /* Para que parezcan fusionadas */
    }

    .line-gold {
      width: 100%;
      height: 2px;
      background-color: var(--bronce-1, #b58c49);
    }

    /* Contenedor de la línea verde y el texto en negrita */
    .right-box {
      display: flex;
      flex-direction: column;
    }

    .line-green {
      width: 100%;
      height: 6px;
      background-color: var(--verde-1, #004b40);
    }

    .text-bold {
      font-size: 4.5rem;
      font-weight: 800;
      color: var(--verde-1, #004b40);
      margin-top: 8px;
      line-height: 1;
      text-transform: uppercase;
      white-space: nowrap;
      letter-spacing: 1px;
    }

    /* Elementos del footer (bottom left) */
    .footer-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 8px;
      background-color: var(--verde-1, #004b40);
    }

    .footer-badge {
      position: absolute;
      bottom: 8px;
      /* Montado sobre la barra footer */
      left: 10vw;
      background-color: var(--bronce-1, #b58c49);
      color: var(--verde-1, #004b40);
      font-weight: 800;
      font-size: 0.75rem;
      padding: 6px 20px;
      text-align: center;
      text-transform: uppercase;
    }

    /* Responsive */
    @media (max-width: 992px) {
      .text-light {
        font-size: 3rem;
      }

      .text-bold {
        font-size: 3.2rem;
      }

      .footer-badge {
        left: 5vw;
        font-size: 0.65rem;
      }
    }

    @media (max-width: 768px) {
      .title-wrapper {
        margin-top: 20vh;
      }

      .text-light {
        font-size: 2rem;
      }

      .text-bold {
        font-size: 2.2rem;
      }

      .footer-badge {
        left: 20px;
        font-size: 0.6rem;
        padding: 4px 12px;
      }
    }
  </style>
</head>

<body>
  <!-- Navbar de imagen superior -->
  <div class="navbar-img">
    <img src="media/denominacion/navbar.png" alt="Navbar Unitropico">
  </div>

  <!-- Contenido Central -->
  <div class="title-wrapper">
    <div class="text-light">Asignación y Gestión</div>
    <div class="box-bottom">
      <div class="left-box">
        <div class="line-gold"></div>
      </div>
      <div class="right-box">
        <div class="line-green"></div>
        <div class="text-bold">De Actividades</div>
      </div>
    </div>
  </div>

  <!-- Barra inferior y recuadro dorado -->
  <div class="footer-bar">
    <div class="footer-badge">
      Ingeniería en<br>
      Inteligencia artificial
    </div>
  </div>

</body>

</html>
