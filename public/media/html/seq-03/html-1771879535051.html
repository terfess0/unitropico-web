<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Justificación - Oferta Internacional - Unitrópico</title>
  <!-- Fuente Montserrat y CSS base -->
  <link rel="stylesheet" href="../css_presentaciones/unitropico_base.css">
  <style>
    /* =========================
       ESTILOS ADICIONALES
    ========================= */
    html,
    body {
      height: 100%;
      margin: 0;
      overflow-x: hidden;
      background: url("../img/background-1.jpg") no-repeat center center fixed;
      background-size: cover;
      font-family: 'Montserrat', sans-serif;
    }

    /* Navbar */
    .navbar-img {
      width: 100%;
      background: var(--verde-1);
      text-align: center;
    }

    .navbar-img img {
      width: 100%;
      height: auto;
      max-height: 110px;
      object-fit: contain;
      display: block;
    }

    /* Contenedor principal */
    .container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 25px;
    }

    /* Estilos para la imagen de Malla Curricular */
    .malla-wrapper {
      text-align: center;
      margin-top: 50px;
      margin-bottom: 60px;
    }

    .malla-wrapper img {
      width: 100%;
      max-width: 200px;
      /* Ajuste del icono central */
      height: auto;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        margin: 15px;
        padding: 0 15px;
      }

      .section-header-line h2 {
        font-size: 1.5rem !important;
      }

      .line-gold {
        width: 100% !important;
        max-width: 550px;
      }

      .line-gray {
        width: 80% !important;
        max-width: 450px;
      }
    }
  </style>
</head>

<body>
  <!-- Navbar de imagen -->
  <div class="navbar-img">
    <img src="media/denominacion/navbar.png" alt="Navbar Unitropico">
  </div>

  <div class="container">

    <div class="container">
    <!-- Título del artículo (alineado izquierda) -->
    <div class="top-left-title subtitulo text-verde-1">
      <span class="text-bronce-1">Artículo 2.5.3.2.3.2.4.</span> Aspectos curriculares - a) Componentes formativos
    </div>

    <!-- Encabezado centrado de Malla Curricular -->
    <div class="section-header-line" style="margin-bottom: 30px; text-align: center; padding-top: 20px;">
      <h2 style="font-weight: 600; font-size: 2.3rem; line-height: 1.3; color: #007580; margin: 0 0 10px 0;">
        Malla Curricular
      </h2>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 0px;">
        <div class="line-gold" style="width: 550px; height: 3px; background-color: #ba9b5e; border-radius: 2px;"></div>
        <div class="line-gray" style="width: 450px; height: 6px; background-color: #e0e0e0; border-radius: 3px;"></div>
      </div>
    </div>

    <!-- Contenido: Imagen de Malla Curricular -->
    <div class="malla-wrapper">
      <img id="btnIrMalla" src="../img/malla_curricular.png" alt="Icono Malla Curricular Inteligencia Artificial">
    </div>

  </div>
  <script>
    const btnPerfil = document.getElementById('btnIrMalla');
    if (btnPerfil) {
      btnPerfil.addEventListener('click', (e) => {
        e.stopPropagation();
        window.parent.postMessage({ type: 'NAVIGATE', targetId: 'content-1771879394828' }, '*');
      });
    }
  </script>
</body>



</html>
