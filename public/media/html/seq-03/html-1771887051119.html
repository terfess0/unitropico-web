<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Justificación - Oferta Internacional - Unitrópico</title>
  <!-- Fuente Montserrat y CSS base -->
  <link rel="stylesheet" href="../css_presentaciones/unitropico_base.css">
  <style>
    /* =========================
       ESTILOS ADICIONALES
    ========================= */
    html,
    body {
      height: 100%;
      margin: 0;
      overflow-x: hidden;
      background: url("../img/background-1.jpg") no-repeat center center fixed;
      background-size: cover;
      font-family: 'Montserrat', sans-serif;
    }

    /* Navbar */
    .navbar-img {
      width: 100%;
      background: var(--verde-1);
      text-align: center;
    }

    .navbar-img img {
      width: 100%;
      height: auto;
      max-height: 110px;
      object-fit: contain;
      display: block;
    }

    /* Contenedor principal */
    .container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 25px;
    }

    /* Estilos para Estrategias de flexibilización */
    .section-header-line {
      margin-bottom: 40px;
      text-align: center;
      padding-top: 10px;
    }

    .section-header-line h2 {
      font-weight: 400;
      font-size: 2.2rem;
      line-height: 1.35;
      color: #007580;
      margin: 0 0 10px 0;
    }

    /* Estilos para el Icono Lateral */
    .comp-icon-row {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 80px;
      margin-bottom: 90px;
      gap: 30px;
    }

    .comp-icon-container {
      width: 140px;
      height: 140px;
      background-color: #fcfcfc;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08), inset 0 2px 10px rgba(0, 0, 0, 0.02);
      border: 3px solid #f2f2f2;
    }

    .comp-icon-container img {
      width: 55%;
      height: auto;
    }

    .comp-text-title {
      font-size: 2.2rem;
      font-weight: 700;
      color: #007580;
    }

    @media (max-width: 768px) {
      .container {
        margin: 15px;
        padding: 0 15px;
      }

      .comp-icon-row {
        flex-direction: column;
        gap: 15px;
      }

      .comp-text-title {
        font-size: 1.8rem;
      }

      .section-header-line h2 {
        font-size: 1.5rem !important;
      }

      .line-gold {
        width: 100% !important;
        max-width: 550px;
      }

      .line-gray {
        width: 80% !important;
        max-width: 450px;
      }
    }
  </style>
</head>

<body>
  <!-- Navbar de imagen -->
  <div class="navbar-img">
    <img src="media/denominacion/navbar.png" alt="Navbar Unitropico">
  </div>

  <div class="container">
    <!-- Título del artículo (alineado izquierda) -->
    <div class="top-left-title subtitulo text-verde-1">
      <span class="text-bronce-1">Artículo 2.5.3.2.3.2.4.</span> Aspectos curriculares - a) Componentes formativos
    </div>

    <!-- Encabezado centrado -->
    <div class="section-header-line" style="margin-bottom: 50px;">
      <h2>
        <strong style="color: #007580; font-weight: 700;">Componentes Pedagógicos
</strong>
      </h2>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 0px;">
        <div class="line-gold" style="width: 550px; height: 3px; background-color: #ba9b5e; border-radius: 2px;"></div>
        <div class="line-gray" style="width: 450px; height: 6px; background-color: #e0e0e0; border-radius: 3px;"></div>
      </div>
    </div>

   

  </div>
</body>

</html>
