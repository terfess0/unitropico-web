<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estructura Orgánica - Unitrópico</title>
  <link rel="stylesheet" href="../css_presentaciones/unitropico_base.css">

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: url("../img/background-1.jpg") no-repeat center center fixed;
      background-size: cover;
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
    }

    /* Navbar (NO se toca estructura) */
    .navbar-img {
      width: 100%;
      background: var(--verde-1);
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .navbar-img img {
      width: 100%;
      max-height: 110px;
      object-fit: contain;
      display: block;
    }

    /* Contenedor principal de la imagen */
    .container {
      width: 100%;
      max-width: 1600px;
      margin: 40px auto;
      padding: 0 40px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .org-chart-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .org-chart-wrapper img {
      width: 100%;
      max-width: 1500px;
      height: auto;
      object-fit: contain;
      display: block;
    }

    /* Responsive fino */
    @media (max-width: 768px) {
      .container {
        padding: 0 15px;
        margin: 25px auto;
      }

      .org-chart-wrapper img {
        max-width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="navbar-img">
    <img src="media/denominacion/navbar.png" alt="Navbar Unitropico">
  </div>

  <div class="container">
    <div class="org-chart-wrapper">
      <!-- PON AQUÍ TU IMAGEN -->
      <img src="media/contexto_institucional/estructura_organica.png" alt="Estructura Orgánica Unitrópico">
    </div>
  </div>

</body>
</html>
