<!DOCTYPE html>
<!-- UNITROPICO-SCALED-V1 -->
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aseguramiento de Calidad - Unitrópico</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../css_presentaciones/unitropico_base.css">

  <style>
    /* ===== RESET y BASE ===== */
    html,
    body {
      min-height: 100%;
      height: 100vh;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: url("img/background-1.png") no-repeat center center fixed;
      background-size: cover;
      font-family: 'Montserrat', sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    /* ===== NAVBAR ====== */
    .navbar-img {
      width: 100%;
      height: 110px;
      background: #004b40 url("media/denominacion/navbar.webp") no-repeat center right;
      background-size: cover;
      display: block;
    }

    /* ===== CONTENEDOR PRINCIPAL ===== */
    .main-container {
      width: 100%;
      height: calc(100vh - 110px);
      padding: 10px 60px;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ÍNDICE SUPERIOR IZQUIERDO */
    .section-index {
      font-size: 1.2rem;
      font-weight: 700;
      color: #004b40;
      margin-bottom: 5px;
      z-index: 10;
    }

    /* CABECERA SECCIÓN */
    .inter-header {
      text-align: center;
      margin-bottom: 25px;
    }

    .inter-title {
      font-size: 2.8rem;
      font-weight: 400;
      color: #00594e;
      margin: 0;
      line-height: 1.2;
    }

    .inter-title b {
      font-weight: 800;
      color: #004b40;
    }

    .inter-underline {
      width: 450px;
      height: 6px;
      background-color: #004b40;
      margin: 10px auto;
      border-radius: 3px;
      position: relative;
    }

    .inter-underline::after {
      content: "";
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 250px;
      height: 4px;
      background-color: #bfa564;
      border-radius: 2px;
    }

    /* CONTENEDOR DE ASISTENTES */
    .asistentes-container {
      flex: 1;
      display: flex;
      justify-content: space-around;
      align-items: center;
      position: relative;
      width: 100%;
      max-width: 1300px;
      margin: 0 auto;
      padding-top: 50px;
    }

    /* Línea de conexión */
    .asistentes-container::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 10%;
      right: 10%;
      height: 3px;
      background-color: #004b40;
      z-index: 1;
    }

    .asistentes-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      z-index: 2;
      width: 30%;
    }

    /* Contenedor de Círculo y Bandera */
    .image-wrapper {
      position: relative;
      width: 280px;
      height: 280px;
      margin-bottom: 20px;
    }

    .flag-bg {
      position: absolute;
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      height: auto;
      opacity: 0.9;
      z-index: -1;
    }

    .circle-photo {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid white;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    .circle-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Estilos de Texto */
    .idioma-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: #004b40;
      margin: 0;
      text-transform: uppercase;
    }

    .asistentes-count {
      font-size: 1.2rem;
      font-weight: 700;
      color: #bfa564;
      margin-bottom: 10px;
    }

    .asistentes-desc {
      font-size: 1.1rem;
      font-weight: 600;
      color: #555;
      line-height: 1.3;
    }

    /* Responsive */
    @media (max-width: 1000px) {
      .asistentes-container {
        flex-direction: column;
        gap: 80px;
        padding-top: 20px;
      }

      .asistentes-container::before {
        display: none;
      }

      .image-wrapper {
        width: 200px;
        height: 200px;
      }

      .inter-title {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>
  <!-- Navbar institucional -->
  <div class="navbar-img"></div>

  <div class="main-container">

    <div class="section-index">2.5.3.2.3.2.7. Relación con el sector externo</div>

    <div class="inter-header">
      <h1 class="inter-title">Acompañamiento <b>Asistentes de Idiomas</b></h1>
      <div class="inter-underline"></div>
    </div>

    <div class="asistentes-container">

      <!-- FRANCÉS -->
      <div class="asistentes-item">
        <div class="image-wrapper">
          <!-- Bandera Francia -->
          <img src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Flag_of_France.svg" class="flag-bg"
            alt="Bandera Francia">
          <div class="circle-photo">
            <!-- Ruta para Foto Francia -->
            <img src="https://images.unsplash.com/photo-1543269664-56d93c1b41a6?auto=format&fit=crop&w=500&q=80"
              alt="Estudiantes Francés">
          </div>
        </div>
        <h2 class="idioma-title">IDIOMA FRANCÉS</h2>
        <p class="asistentes-count">5 Asistentes</p>
        <p class="asistentes-desc">Club conversacionales</p>
      </div>

      <!-- INGLÉS -->
      <div class="asistentes-item">
        <div class="image-wrapper">
          <!-- Bandera Reino Unido -->
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Flag_of_the_United_Kingdom_%283-2_aspect_ratio%29.svg"
            class="flag-bg" alt="Bandera UK">
          <div class="circle-photo">
            <!-- Ruta para Foto Inglés -->
            <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=500&q=80"
              alt="Estudiantes Inglés">
          </div>
        </div>
        <h2 class="idioma-title">IDIOMA INGLÉS</h2>
        <p class="asistentes-count">4 Asistentes</p>
        <p class="asistentes-desc">Ferias y encuentros interculturales</p>
      </div>

      <!-- MANDARÍN -->
      <div class="asistentes-item">
        <div class="image-wrapper">
          <!-- Bandera China -->
          <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Flag_of_the_People%27s_Republic_of_China.svg"
            class="flag-bg" alt="Bandera China">
          <div class="circle-photo">
            <!-- Ruta para Foto Mandarín -->
            <img src="https://images.unsplash.com/photo-1523240795612-9a054b0db644?auto=format&fit=crop&w=500&q=80"
              alt="Estudiantes Mandarín">
          </div>
        </div>
        <h2 class="idioma-title">IDIOMA MANDARÍN</h2>
        <p class="asistentes-count">3 Estudiantes</p>
        <p class="asistentes-desc">Charlas en temas relacionados con su cultura</p>
      </div>

    </div>

  </div> <!-- /.main-container -->

</body>

</html>
