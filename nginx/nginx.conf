server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React Router HTML5 History
    location / {
        # 1. Check live_public (uploaded files), 2. Build files, 3. SPA fallback
        try_files /live_public$uri $uri /index.html;
    }

    # Reverse proxy for backend API
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Dynamic assets from host public folder
    location /img/ {
        root /usr/share/nginx/html/live_public;
        autoindex on;
    }

    location /media/ {
        root /usr/share/nginx/html/live_public;
        autoindex on;
    }

    location /css_presentaciones/ {
        root /usr/share/nginx/html/live_public;
        autoindex on;
    }
}
