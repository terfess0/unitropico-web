server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React Router HTML5 History
    location / {
        try_files $uri /index.html;
    }

    # Reverse proxy for backend API
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable cache for API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Static assets locations (Smart Cache)
    location ~* \.(jpg|jpeg|png|gif|mp4|pdf)$ {
        add_header Cache-Control "public, no-cache, must-revalidate";
        etag on;
        autoindex on;
    }

    # HTML Presentation slides (Always validate/No persistent cache)
    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    # Shared CSS Presentaciones
    location /css_presentaciones/ {
        autoindex on;
    }
}
