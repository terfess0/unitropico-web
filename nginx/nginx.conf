server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React Router HTML5 History
    location / {
        # Check external_public first (live uploads), then built-in files, then fallback to SPA
        try_files /external_public$uri $uri /index.html;
    }

    # Reverse proxy for backend API
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve static media and other public files natively from Nginx via shared volume
    location /media/ {
        alias /usr/share/nginx/html/external_public/media/;
        autoindex on;
    }

    location /img/ {
        alias /usr/share/nginx/html/external_public/img/;
        autoindex on;
    }
}
